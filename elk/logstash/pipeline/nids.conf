# Logstash Pipeline Configuration for AI-NIDS
# Processes incoming alerts from the NIDS and forwards to Elasticsearch

input {
  # TCP input for Flask API alerts
  tcp {
    port => 5044
    codec => json_lines
    type => "nids-alert"
  }
  
  # Beats input (for Filebeat or other shippers)
  beats {
    port => 5045
    type => "filebeat"
  }
}

filter {
  # Parse JSON if not already parsed
  if [type] == "nids-alert" {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
    
    # Add severity based on verdict
    if [final_verdict] == "Attack" {
      mutate {
        add_field => { "severity" => "high" }
        add_tag => ["threat", "attack"]
      }
    } else if [final_verdict] == "Suspicious" {
      mutate {
        add_field => { "severity" => "medium" }
        add_tag => ["suspicious"]
      }
    } else {
      mutate {
        add_field => { "severity" => "low" }
        add_tag => ["benign"]
      }
    }
    
    # GeoIP lookup for source IP (optional - requires GeoIP database)
    if [src_ip] and [src_ip] !~ /^(127\.|10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.)/ {
      geoip {
        source => "src_ip"
        target => "geoip"
        # database => "/usr/share/GeoIP/GeoLite2-City.mmdb"  # Uncomment if GeoIP DB is mounted
        add_field => {
          "[geoip][coordinates]" => "%{[geoip][longitude]},%{[geoip][latitude]}"
        }
      }
    }
    
    # Add threat intelligence score visualization
    if [ti_score] {
      if [ti_score] >= 70 {
        mutate {
          add_field => { "ti_severity" => "critical" }
          add_tag => ["known-malicious"]
        }
      } else if [ti_score] >= 40 {
        mutate {
          add_field => { "ti_severity" => "high" }
          add_tag => ["threat-detected"]
        }
      } else if [ti_score] >= 20 {
        mutate {
          add_field => { "ti_severity" => "medium" }
          add_tag => ["suspicious-ip"]
        }
      }
    }
    
    # Extract model predictions for easier visualization
    if [rf_label] {
      mutate {
        add_field => { "primary_model" => "RandomForest" }
      }
    }
    
    # Classify attack category
    if [rf_label] =~ /(?i)(ddos|dos)/ {
      mutate {
        add_field => { "attack_category" => "DoS/DDoS" }
      }
    } else if [rf_label] =~ /(?i)(port.?scan)/ {
      mutate {
        add_field => { "attack_category" => "Reconnaissance" }
      }
    } else if [rf_label] =~ /(?i)(brute.?force)/ {
      mutate {
        add_field => { "attack_category" => "Authentication Attack" }
      }
    } else if [rf_label] =~ /(?i)(web)/ {
      mutate {
        add_field => { "attack_category" => "Web Attack" }
      }
    } else if [rf_label] =~ /(?i)(bot)/ {
      mutate {
        add_field => { "attack_category" => "Botnet" }
      }
    }
  }
}

output {
  # Output to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "ainids-alerts-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }
  
  # Debug output (comment out in production)
  # stdout {
  #   codec => rubydebug
  # }
}
